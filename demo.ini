[General]
network = SmartSubstationTopology
sim-time-limit = 1s
ned-path = .;src;../inet4.5/src

# ==================== 网络基础配置 ====================
*.configurator.typename = "IPv4NetworkConfigurator"

# 确保所有设备都配置了IP协议栈
**.hasIpv4 = true
**.hasUdp = true
**.hasTcp = false

# ==================== TSN优先队列与门控列表 ====================
# ==================== TSN队列和GCL调度配置 ====================
# 优化策略：只在流量汇聚/竞争的端口配置GCL，避免不必要的调度开销
# 配置原则：
#   1. 核心层（TSN_A/B）：全端口配置（连接多个下级交换机和服务器，流量复杂）
#   2. 综合接入层（ACC_COMMON）：仅配置上联口eth[15]（汇聚多设备流量）
#   3. 母线保护接入层（ACC_BUS1/2/3）：不配置GCL（单一SV流量）

# 全局不启用 egress traffic shaping
*.TSN*.hasEgressTrafficShaping = false

# ==================== 1. 核心层TSN交换机（TSN_A/TSN_B）全端口配置 ====================
# 增大TSN交换机队列容量，避免在交换机处丢包（Camera已增容，TSN也需增容）
*.TSN*.eth[*].queue.packetCapacity = 5000  # 默认1000 → 5000

*.TSN_A.eth[*].macLayer.queue.numTrafficClasses = 8
*.TSN_A.eth[*].macLayer.queue.classifier.typename = "ContentBasedClassifier"
# 如果一个包匹配不到任何filter就默认放到queue0里面
*.TSN_A.eth[*].macLayer.queue.classifier.defaultGateIndex = 0   
*.TSN_A.eth[*].macLayer.queue.classifier.packetFilters = ["__Q0__", "__Q1__", "__Q2__", "OM_Data_Burst_*", "Video_Stream*", "VoIP_Stream*", "GOOSE*", "*SV*"]


*.TSN_B.eth[*].macLayer.queue.numTrafficClasses = 8
*.TSN_B.eth[*].macLayer.queue.classifier.typename = "ContentBasedClassifier"
*.TSN_B.eth[*].macLayer.queue.classifier.defaultGateIndex = 0
*.TSN_B.eth[*].macLayer.queue.classifier.packetFilters = ["__Q0__", "__Q1__", "__Q2__", "OM_Data_Burst_*", "Video_Stream*", "VoIP_Stream*", "GOOSE*", "*SV*"]

# 1.1 显式配置监控中心相关链路GCL（基于NED连接顺序端口号）
# TSN_A.eth[5] <-> MonitoringCenter_A, TSN_A.eth[6] <-> MonitoringCenter_Main
# TSN_B.eth[5] <-> MonitoringCenter_B, TSN_B.eth[6] <-> MonitoringCenter_Main
*.TSN_A.eth[5..6].macLayer.queue.transmissionGate[0].durations = []
*.TSN_A.eth[5..6].macLayer.queue.transmissionGate[1].durations = []
*.TSN_A.eth[5..6].macLayer.queue.transmissionGate[2].durations = []
*.TSN_A.eth[5..6].macLayer.queue.transmissionGate[3].offset = 400us
*.TSN_A.eth[5..6].macLayer.queue.transmissionGate[3].durations = [300us, 700us]
*.TSN_A.eth[5..6].macLayer.queue.transmissionGate[4].offset = 300us
*.TSN_A.eth[5..6].macLayer.queue.transmissionGate[4].durations = [400us, 600us]
*.TSN_A.eth[5..6].macLayer.queue.transmissionGate[5].offset = 200us
*.TSN_A.eth[5..6].macLayer.queue.transmissionGate[5].durations = [500us, 500us]
*.TSN_A.eth[5..6].macLayer.queue.transmissionGate[6].offset = 100us
*.TSN_A.eth[5..6].macLayer.queue.transmissionGate[6].durations = [700us, 300us]
*.TSN_A.eth[5..6].macLayer.queue.transmissionGate[7].offset = 0us
*.TSN_A.eth[5..6].macLayer.queue.transmissionGate[7].durations = [800us, 200us]

*.TSN_B.eth[5..6].macLayer.queue.transmissionGate[0].durations = []
*.TSN_B.eth[5..6].macLayer.queue.transmissionGate[1].durations = []
*.TSN_B.eth[5..6].macLayer.queue.transmissionGate[2].durations = []
*.TSN_B.eth[5..6].macLayer.queue.transmissionGate[3].offset = 400us
*.TSN_B.eth[5..6].macLayer.queue.transmissionGate[3].durations = [300us, 700us]
*.TSN_B.eth[5..6].macLayer.queue.transmissionGate[4].offset = 300us
*.TSN_B.eth[5..6].macLayer.queue.transmissionGate[4].durations = [400us, 600us]
*.TSN_B.eth[5..6].macLayer.queue.transmissionGate[5].offset = 200us
*.TSN_B.eth[5..6].macLayer.queue.transmissionGate[5].durations = [500us, 500us]
*.TSN_B.eth[5..6].macLayer.queue.transmissionGate[6].offset = 100us
*.TSN_B.eth[5..6].macLayer.queue.transmissionGate[6].durations = [700us, 300us]
*.TSN_B.eth[5..6].macLayer.queue.transmissionGate[7].offset = 0us
*.TSN_B.eth[5..6].macLayer.queue.transmissionGate[7].durations = [800us, 200us]

# ==================== 2. 综合接入层（ACC_COMMON）仅配置上联口eth[15] ====================
# 原因：eth[15]汇聚所有设备的上行流量（SV + Video + VoIP），存在多优先级竞争
# eth[0-14]连接单个设备（出口无流量或单一流量类型），无需GCL
*.TSN_A_ACC_COMMON.eth[15].macLayer.queue.numTrafficClasses = 8
*.TSN_A_ACC_COMMON.eth[15].macLayer.queue.classifier.typename = "ContentBasedClassifier"
*.TSN_A_ACC_COMMON.eth[15].macLayer.queue.classifier.defaultGateIndex = 0
*.TSN_A_ACC_COMMON.eth[15].macLayer.queue.classifier.packetFilters = ["__Q0__", "__Q1__", "__Q2__", "OM_Data_Burst_*", "Video_Stream*", "VoIP_Stream*", "GOOSE*", "*SV*"]
*.TSN_A_ACC_COMMON.eth[15].macLayer.queue.transmissionGate[0].durations = []
*.TSN_A_ACC_COMMON.eth[15].macLayer.queue.transmissionGate[1].durations = []
*.TSN_A_ACC_COMMON.eth[15].macLayer.queue.transmissionGate[2].durations = []
*.TSN_A_ACC_COMMON.eth[15].macLayer.queue.transmissionGate[3].offset = 400us
*.TSN_A_ACC_COMMON.eth[15].macLayer.queue.transmissionGate[3].durations = [300us, 700us]
*.TSN_A_ACC_COMMON.eth[15].macLayer.queue.transmissionGate[4].offset = 300us
*.TSN_A_ACC_COMMON.eth[15].macLayer.queue.transmissionGate[4].durations = [400us, 600us]
*.TSN_A_ACC_COMMON.eth[15].macLayer.queue.transmissionGate[5].offset = 200us
*.TSN_A_ACC_COMMON.eth[15].macLayer.queue.transmissionGate[5].durations = [500us, 500us]
*.TSN_A_ACC_COMMON.eth[15].macLayer.queue.transmissionGate[6].offset = 100us
*.TSN_A_ACC_COMMON.eth[15].macLayer.queue.transmissionGate[6].durations = [700us, 300us]
*.TSN_A_ACC_COMMON.eth[15].macLayer.queue.transmissionGate[7].offset = 0us
*.TSN_A_ACC_COMMON.eth[15].macLayer.queue.transmissionGate[7].durations = [800us, 200us]

*.TSN_B_ACC_COMMON.eth[15].macLayer.queue.numTrafficClasses = 8
*.TSN_B_ACC_COMMON.eth[15].macLayer.queue.classifier.typename = "ContentBasedClassifier"
*.TSN_B_ACC_COMMON.eth[15].macLayer.queue.classifier.defaultGateIndex = 0
*.TSN_B_ACC_COMMON.eth[15].macLayer.queue.classifier.packetFilters = ["__Q0__", "__Q1__", "__Q2__", "OM_Data_Burst_*", "Video_Stream*", "VoIP_Stream*", "GOOSE*", "*SV*"]
*.TSN_B_ACC_COMMON.eth[15].macLayer.queue.transmissionGate[0].durations = []
*.TSN_B_ACC_COMMON.eth[15].macLayer.queue.transmissionGate[1].durations = []
*.TSN_B_ACC_COMMON.eth[15].macLayer.queue.transmissionGate[2].durations = []
*.TSN_B_ACC_COMMON.eth[15].macLayer.queue.transmissionGate[3].offset = 400us
*.TSN_B_ACC_COMMON.eth[15].macLayer.queue.transmissionGate[3].durations = [300us, 700us]
*.TSN_B_ACC_COMMON.eth[15].macLayer.queue.transmissionGate[4].offset = 300us
*.TSN_B_ACC_COMMON.eth[15].macLayer.queue.transmissionGate[4].durations = [400us, 600us]
*.TSN_B_ACC_COMMON.eth[15].macLayer.queue.transmissionGate[5].offset = 200us
*.TSN_B_ACC_COMMON.eth[15].macLayer.queue.transmissionGate[5].durations = [500us, 500us]
*.TSN_B_ACC_COMMON.eth[15].macLayer.queue.transmissionGate[6].offset = 100us
*.TSN_B_ACC_COMMON.eth[15].macLayer.queue.transmissionGate[6].durations = [700us, 300us]
*.TSN_B_ACC_COMMON.eth[15].macLayer.queue.transmissionGate[7].offset = 0us
*.TSN_B_ACC_COMMON.eth[15].macLayer.queue.transmissionGate[7].durations = [800us, 200us]

# ==================== 3. 母线保护接入层（ACC_BUS1/2/3）不配置GCL ====================
# 原因：这些交换机只处理单一SV流量，所有端口的出口队列都只有queue 7，无需时间门控
# queueing相关映射：
# q7: SV / Bus_SV（最高）
# q6: GOOSE
# q5: VoIP_Stream
# q4: Video_Stream / Video_Stream_Main
# q3: OM_Data_Burst_A / OM_Data_Burst_B
# q0-q2: 默认背景流量（始终开放）

# 接口容量（10Gbps）
**.eth[*].datarate = 10Gbps
**.ppp[*].datarate = 10Gbps
*.MonitoringCenter_*.eth[*].datarate = 10Gbps  # 明确监控中心端口带宽

# Camera队列容量配置（避免大视频帧队列溢出）
*.Camera*.eth[*].queue.packetCapacity = 10000  # 默认1000 → 10000，足够容纳视频分片

# Router设备IP转发配置
*.borderGateway1.hasIpv4 = true
*.borderGateway1.forwarding = true
*.borderGateway2.hasIpv4 = true
*.borderGateway2.forwarding = true
*.otnDevice.hasIpv4 = true
*.otnDevice.forwarding = true

# 网卡配置 - 确保以太网和PPP接口正常工作
**.eth[*].typename = "EthernetInterface"
**.ppp[*].typename = "PppInterface"

# ==================== OTN路由策略（基于DSCP） ====================
# I/II区（SV/GOOSE）：DSCP=56（CS7，最高优先级）->走OTN_I_II_Channel（低延迟）
# III/IV区（背景流）：DSCP=0或40（EF）->走OTN_III_IV_Channel（混跑）
# 注：OMNeT++基础模型中，路由基于目的地址而非DSCP；实际映射可通过流量工程实现

# ==================== 基础流量配置 ====================
# 1. 甲站MU -> 甲站保护装置 (SV采样值流)
# 帧率4000帧/秒(250μs/帧)，单帧大小140B，最高优先级(7)
*.MU_A.numApps = 1
*.MU_A.app[0].typename = "src.apps.SvGeneratorApp"
*.MU_A.app[0].localDestAddress = "Protection_A"
*.MU_A.app[0].localDestPort = 2000
*.MU_A.app[0].remoteDestAddress = "Protection_B"
*.MU_A.app[0].remoteDestPort = 2001
*.MU_A.app[0].messageLength = 140B
*.MU_A.app[0].sendInterval = 250us
*.MU_A.app[0].currentBase = 100A
*.MU_A.app[0].noiseStd = 1A #例如 noiseStd = 1A，大多数样本会在 currentBase ± 3A 范围内（约99.7%）。
*.MU_A.app[0].faultEnabled = true
*.MU_A.app[0].faultStart = 2s   # 故障发生在2s时刻
*.MU_A.app[0].faultDuration = 30ms
*.MU_A.app[0].faultDelta = 200A
*.MU_A.app[0].dscp = 56  # CS7最高优先级，走I/II区低延迟专用通道
*.Protection_A.numApps = 1
*.Protection_A.app[0].typename = "src.apps.DifferentialProtectionApp"
*.Protection_A.app[0].localPort = 2000
*.Protection_A.app[0].remotePort = 2001
*.Protection_A.app[0].threshold = 1A
*.Protection_A.app[0].gooseDestLocal = "IT_A"
*.Protection_A.app[0].gooseDestRemote = "IT_B"
*.Protection_A.app[0].goosePort = 3000
*.Protection_A.app[0].gooseDscp = 48  # CS6次高优先级，为GOOSE保留
*.Protection_A.app[0].recordStats = true
*.Protection_A.app[0].strictSlotMatch = false
*.Protection_A.app[0].maxSlotLag = 1000

# 甲站智能终端接收端
*.IT_A.numApps = 1
*.IT_A.app[0].typename = "UdpSink"
*.IT_A.app[0].localPort = 3000
*.IT_A.app[0].verbose = true
*.IT_B.numApps = 1
*.IT_B.app[0].typename = "UdpSink"
*.IT_B.app[0].localPort = 3000
*.IT_B.app[0].verbose = true
*.MU_B.numApps = 1
*.MU_B.app[0].typename = "src.apps.SvGeneratorApp"
*.MU_B.app[0].localDestAddress = "Protection_B"
*.MU_B.app[0].localDestPort = 2000
*.MU_B.app[0].remoteDestAddress = "Protection_A"
*.MU_B.app[0].remoteDestPort = 2001
*.MU_B.app[0].messageLength = 140B
*.MU_B.app[0].sendInterval = 250us
*.MU_B.app[0].currentBase = 100A
*.MU_B.app[0].noiseStd = 1A
*.MU_B.app[0].faultEnabled = true
*.MU_B.app[0].faultStart = 2s
*.MU_B.app[0].faultDuration = 30ms
*.MU_B.app[0].faultDelta = 200A
*.MU_B.app[0].dscp = 56  # CS7最高优先级，走I/II区低延迟专用通道

# ==================== 母线保护配置 ====================
# 母线保护（其它背景流2）：其它相关MU向母线保护装置汇聚SV流量
# 按照SV采样值流相同参数配置：4000帧/秒，140B，最高优先级

