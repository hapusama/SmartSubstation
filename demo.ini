*.VoIP*_A.app[0].messageLength = 200B
*.VoIP*_A.app[0].sendInterval = 20ms
*.VoIP*_A.app[0].startTime = uniform(0s, 200ms)
*.VoIP*_A.app[0].packetName = "VoIP_Stream"
*.VoIP*_A.app[0].dscp = 40
*.VoIP*_A.app[0].verbose = true

