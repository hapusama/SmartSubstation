*.*_A.displayString = "i=abstract/pc"
*.*_B.displayString = "i=abstract/pc" 
*.borderGateway*.displayString = "i=misc/router"
*.otnDevice.displayString = "i=misc/router_vs"

# 关键设备特殊标记
*.MU_A.displayString = "i=block/switch,green"
*.Protection_A.displayString = "i=block/computer,red"
*.IT_A.displayString = "i=block/plug,blue"
*.Protection_B.displayString = "i=block/computer,red"
*.MonitoringCenter_A.displayString = "i=block/server,blue"
*.MonitoringCenter_B.displayString = "i=block/server,blue"
*.MonitoringCenter_Main.displayString = "i=block/server,cyan"

# 母线保护设备特殊标记
*.BusProtection_A.displayString = "i=block/computer,orange"
*.BusProtection_B.displayString = "i=block/computer,orange"
*.BusProtection_MU*_A.displayString = "i=block/switch,yellow"
*.BusProtection_MU*_B.displayString = "i=block/switch,yellow"

# 背景流量设备标记
*.Camera*_A.displayString = "i=device/camera,gray"
*.Camera*_B.displayString = "i=device/camera,gray"
*.VoIP1_A.displayString = "i=device/phone,gray"
*.VoIP2_A.displayString = "i=device/phone,gray"
*.VoIP1_B.displayString = "i=device/phone,gray"
*.VoIP2_B.displayString = "i=device/phone,gray"

# 信道显示设置
**.channel.displayString = "ls=black,1"

[Config GCLDiff-True]
extends = General
description = "A/B baseline for clear GCL effect: same traffic, shaping ON"

# 只在该配置打开门控总开关
*.TSN*.hasEgressTrafficShaping = true

# 激进GCL策略：制造明显的调度差异
# q7 (SV/GOOSE): 保持较大窗口 [300us open, 700us closed] - 30%开放
*.TSN*.eth[*].macLayer.queue.transmissionGate[7].offset = 0us
*.TSN*.eth[*].macLayer.queue.transmissionGate[7].durations = [0us, 1000us]

# q6 (GOOSE): 与SV错开
*.TSN*.eth[*].macLayer.queue.transmissionGate[6].offset = 300us
*.TSN*.eth[*].macLayer.queue.transmissionGate[6].durations = [300us, 700us]

# q5 (VoIP): 中等优先级 [200us, 800us] - 20%开放
*.TSN*.eth[*].macLayer.queue.transmissionGate[5].offset = 600us
*.TSN*.eth[*].macLayer.queue.transmissionGate[5].durations = [200us, 800us]

# q4 (Video): 极窄窗口制造明显阻塞 [50us open, 950us closed] - 仅5%开放！
*.TSN*.eth[*].macLayer.queue.transmissionGate[4].offset = 800us
*.TSN*.eth[*].macLayer.queue.transmissionGate[4].durations = [50us, 950us]

# 启用跨站video到MonitoringCenter_Main，在100ms启动产生竞争
*.Camera*_A.app[1].startTime = 100ms
*.Camera*_B.app[1].startTime = 100ms
*.MonitoringCenter_A.app[1].startTime = 500ms
*.MonitoringCenter_B.app[1].startTime = 600ms

[Config GCLDiff-False]
extends = GCLDiff-True
description = "A/B baseline for clear GCL effect: same traffic, shaping OFF"

# 与 GCLDiff-True 仅此一项不同
*.TSN*.hasEgressTrafficShaping = false

